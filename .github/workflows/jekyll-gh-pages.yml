<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORRO DESIGNS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#0d0d0d;
      color:white;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    /* NAVBAR */
    nav{
      width:100%;
      padding:20px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      top:0;
      left:0;
      z-index:1000;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(10px);
    }

    .logo{
      font-size:28px;
      font-weight:700;
      letter-spacing:2px;
      color:#ffffff;
    }

    .logo span{
      color:#00c2ff;
    }

    nav ul{
      display:flex;
      gap:30px;
      list-style:none;
    }

    nav ul li a{
      transition:0.3s;
      font-size:15px;
    }

    nav ul li a:hover{
      color:#00c2ff;
    }

    /* HERO SECTION */
    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 8%;
      background:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.7)),
      url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop')
      center/cover no-repeat;
    }

    .hero-content h1{
      font-size:72px;
      line-height:1.1;
      margin-bottom:20px;
    }

    .hero-content h1 span{
      color:#00c2ff;
    }

    .hero-content p{
      max-width:700px;
      margin:auto;
      color:#d9d9d9;
      font-size:18px;
      line-height:1.8;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      padding:14px 34px;
      border-radius:50px;
      background:#00c2ff;
      color:#000;
      font-weight:600;
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-4px);
      box-shadow:0 10px 25px rgba(0,194,255,0.35);
    }

    /* SECTION */
    section{
      padding:100px 8%;
    }

    .section-title{
      text-align:center;
      margin-bottom:60px;
    }

    .section-title h2{
      font-size:42px;
      margin-bottom:10px;
    }

    .section-title p{
      color:#bbbbbb;
    }

    /* PORTFOLIO GRID */
    .portfolio-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .portfolio-card{
      position:relative;
      overflow:hidden;
      border-radius:18px;
      cursor:pointer;
    }

    .portfolio-card img{
      width:100%;
      height:100%;
      display:block;
      transition:0.5s;
    }

    .portfolio-card:hover img{
      transform:scale(1.08);
    }

    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(
      transparent,
      rgba(0,0,0,0.9));
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:25px;
    }

    .overlay h3{
      font-size:24px;
      margin-bottom:8px;
    }

    .overlay p{
      color:#d7d7d7;
      font-size:14px;
    }

    /* ABOUT */
    .about{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:50px;
      align-items:center;
    }

    .about img{
      width:100%;
      border-radius:20px;
    }

    .about-text h2{
      font-size:42px;
      margin-bottom:20px;
    }

    .about-text p{
      color:#cfcfcf;
      line-height:1.8;
      margin-bottom:18px;
    }

    /* CONTACT */
    .contact{
      text-align:center;
      background:#111;
      border-radius:20px;
      padding:70px 20px;
    }

    .contact h2{
      font-size:42px;
      margin-bottom:20px;
    }

    .contact p{
      color:#cfcfcf;
      margin-bottom:30px;
    }

    .socials{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:20px;
    }

    .socials a{
      width:45px;
      height:45px;
      border-radius:50%;
      background:#1d1d1d;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:0.3s;
      font-size:18px;
    }

    .socials a:hover{
      background:#00c2ff;
      color:#000;
      transform:translateY(-5px);
    }

    footer{
      text-align:center;
      padding:30px;
      color:#999;
      font-size:14px;
    }

    /* RESPONSIVE */
    @media(max-width:768px){

      .hero-content h1{
        font-size:48px;
      }

      nav{
        flex-direction:column;
        gap:15px;
      }

      nav ul{
        gap:18px;
      }

      .section-title h2,
      .about-text h2,
      .contact h2{
        font-size:34px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">ORRO <span>DESIGNS</span></div>

    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#portfolio">Portfolio</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero" id="home">
    <div class="hero-content">
      <h1>Creative <span>Design Portfolio</span></h1>

      <p>
        ORRO DESIGNS creates modern, bold, and visually stunning digital experiences.
        We transform ideas into beautiful designs that inspire and connect.
      </p>

      <a href="#portfolio" class="btn">View Projects</a>
    </div>
  </section>

  <!-- PORTFOLIO -->
  <section id="portfolio">
    <div class="section-title">
      <h2>Featured Work</h2>
      <p>Selected projects crafted with creativity and precision.</p>
    </div>

    <div class="portfolio-grid">

      <div class="portfolio-card">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop" alt="">
        <div class="overlay">
          <h3>Web Design</h3>
          <p>Modern responsive website interface concepts.</p>
        </div>
      </div>

      <div class="portfolio-card">
        <img src="https://images.unsplash.com/photo-1522542550221-31fd19575a2d?q=80&w=1200&auto=format&fit=crop" alt="">
        <div class="overlay">
          <h3>Brand Identity</h3>
          <p>Minimal and professional branding systems.</p>
        </div>
      </div>

      <div class="portfolio-card">
        <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80&w=1200&auto=format&fit=crop" alt="">
        <div class="overlay">
          <h3>UI/UX Design</h3>
          <p>Creative mobile and desktop user experiences.</p>
        </div>
      </div>

      <div class="portfolio-card">
        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop" alt="">
        <div class="overlay">
          <h3>Creative Studio</h3>
          <p>High-end visuals and artistic design direction.</p>
        </div>
      </div>

    </div>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <div class="about">

      <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=1200&auto=format&fit=crop" alt="">

      <div class="about-text">
        <h2>About ORRO DESIGNS</h2>

        <p>
          ORRO DESIGNS is a creative portfolio brand focused on premium digital design,
          visual storytelling, and modern aesthetics.
        </p>

        <p>
          From branding to web experiences, every project is designed with attention
          to detail, originality, and impact.
        </p>

        <a href="#contact" class="btn">Let's Work Together</a>
      </div>

    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <div class="contact">
      <h2>Get In Touch</h2>

      <p>
        Ready to build something creative and unique? Contact ORRO DESIGNS today.
      </p>

      <a href="mailto:hello@orrodesigns.com" class="btn">
        hello@orrodesigns.com
      </a>

      <div class="socials">
        <a href="#">FB</a>
        <a href="#">IG</a>
        <a href="#">TW</a>
        <a href="#">BE</a>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 ORRO DESIGNS — All Rights Reserved.
  </footer>

</body>
</html>
